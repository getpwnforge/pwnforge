services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    user: "1001:1001"
    cap_drop: [ALL]
    cap_add: [CHOWN, FOWNER, SETGID, SETUID]
    security_opt: ["no-new-privileges:true"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256m
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 128m
    networks:
      - internal

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    user: "1001:1001"
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  backend:
    image: ghcr.io/getpwnforge/pwnforge-backend:v1.0.0
    restart: unless-stopped
    user: "1001:1001"
    read_only: true
    tmpfs:
      - /tmp:size=64m,noexec
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      PORT: ${PORT}
      CORS_ORIGIN: ${CORS_ORIGIN}
      S3_ENDPOINT: ${MINIO_ENDPOINT}
      S3_ACCESS_KEY: ${MINIO_ROOT_USER}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT}/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"
    networks:
      - internal

  frontend:
    image: ghcr.io/getpwnforge/pwnforge-frontend:v1.0.0
    restart: unless-stopped
    user: "1001:1001"
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx:size=32m
      - /var/run
    cap_drop: [ALL]
    cap_add: [NET_BIND_SERVICE]
    security_opt: ["no-new-privileges:true"]
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${HTTP_PORT}:80"
    deploy:
      resources:
        limits:
          memory: 64m
          cpus: "0.25"
    networks:
      - internal
      - public

networks:
  internal:
    driver: bridge
    internal: true
  public:
    driver: bridge

volumes:
  db-data:
  minio-data:
    driver: local
    driver_opts:
      type: none
      device: /data/pwnforge/minio
      o: bind,noexec,nosuid,nodev