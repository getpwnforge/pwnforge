name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly scan even without code changes — new CVEs get published against pinned deps
    - cron: "0 6 * * 1"

jobs:
  cargo-audit:
    name: cargo audit (backend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Run audit
        working-directory: backend
        # Fails the job on any vulnerability of severity medium or higher
        run: cargo audit --deny warnings

  pnpm-audit:
    name: pnpm audit (frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 9.12.3
          package_json_file: frontend/package.json
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - working-directory: frontend
        # See ci.yml for why --ignore-scripts is here.
        run: pnpm install --frozen-lockfile --ignore-scripts
      - name: Run audit
        working-directory: frontend
        run: pnpm audit --audit-level=moderate

  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    strategy:
      matrix:
        language: ["rust", "javascript-typescript"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
