name: CI

on:
  push:
    branches: [dev, "release/**", main]
  pull_request:
    branches: [dev]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changed areas
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Filter paths
        id: filter
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'

  backend:
    name: Backend (Rust)
    needs: changes
    # Skipping (rather than filtering at the trigger level) keeps this check
    # completing with a real status on every run, even when backend/ didn't
    # change. A workflow that never triggers at all leaves a required status
    # check stuck "Pending" forever and permanently blocks merging. A skipped
    # job reports as passed instead.
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: pwnforge
          # Ephemeral CI-only credential, never used outside this job. Still pulled from
          # a repo secret (Settings > Secrets > Actions > CI_DB_PASSWORD) rather than a
          # literal, so scanners don't flag it and no real value ever lives in the repo.
          POSTGRES_PASSWORD: ${{ secrets.CI_DB_PASSWORD }}
          POSTGRES_DB: pwnforge_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry & target
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: backend

      - name: Check formatting
        working-directory: backend
        run: cargo fmt --check

      - name: Clippy
        working-directory: backend
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: postgres://pwnforge:${{ secrets.CI_DB_PASSWORD }}@localhost:5432/pwnforge_test
          REDIS_URL: redis://localhost:6379
        run: cargo test --all-features

  frontend:
    name: Frontend (React/TS)
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Enable Corepack
        # Corepack ships with Node itself and reads the "packageManager" field in
        # package.json natively, no separate action needed. Sidesteps
        # pnpm/action-setup's package_json_file bug entirely
        # (https://github.com/pnpm/action-setup/issues/227).
        run: corepack enable

      - name: Activate pinned pnpm version
        # Corepack resolves "packageManager" by walking up from the invoking
        # command's cwd. actions/setup-node's pnpm cache step below runs from the
        # repo root, not frontend/, so it can't discover frontend/package.json's
        # packageManager field there and silently falls back to "latest" instead
        # of erroring. That then crashed needing a newer Node than we pin here.
        # Activating the exact pinned version explicitly, once, avoids relying on
        # cwd-based discovery for the rest of the job.
        run: |
          version=$(grep -oP '"packageManager":\s*"pnpm@\K[^"]+' frontend/package.json)
          corepack prepare "pnpm@$version" --activate

      - name: Install Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: frontend
        # --ignore-scripts blocks lifecycle scripts (preinstall/install/postinstall) from
        # any dependency, including transitive ones, from running arbitrary code at install
        # time. If a specific trusted package genuinely needs its build script (native
        # bindings, etc.), allowlist it explicitly via `pnpm.onlyBuiltDependencies` in
        # package.json instead of dropping this flag.
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Lint
        working-directory: frontend
        run: pnpm lint

      - name: Type check
        working-directory: frontend
        run: pnpm typecheck

      - name: Test
        working-directory: frontend
        run: pnpm test

      - name: Build
        working-directory: frontend
        run: pnpm build
