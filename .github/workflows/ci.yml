name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (Rust)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: pwnforge
          # Ephemeral CI-only credential, never used outside this job. Still pulled from
          # a repo secret (Settings > Secrets > Actions > CI_DB_PASSWORD) rather than a
          # literal, so scanners don't flag it and no real value ever lives in the repo.
          POSTGRES_PASSWORD: ${{ secrets.CI_DB_PASSWORD }}
          POSTGRES_DB: pwnforge_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry & target
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: backend

      - name: Check formatting
        working-directory: backend
        run: cargo fmt --check

      - name: Clippy
        working-directory: backend
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: postgres://pwnforge:${{ secrets.CI_DB_PASSWORD }}@localhost:5432/pwnforge_test
          REDIS_URL: redis://localhost:6379
        run: cargo test --all-features

  frontend:
    name: Frontend (React/TS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          package_json_file: frontend/package.json

      - name: Install Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: frontend
        # --ignore-scripts blocks lifecycle scripts (preinstall/install/postinstall) from
        # any dependency, including transitive ones, from running arbitrary code at install
        # time. If a specific trusted package genuinely needs its build script (native
        # bindings, etc.), allowlist it explicitly via `pnpm.onlyBuiltDependencies` in
        # package.json instead of dropping this flag.
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Lint
        working-directory: frontend
        run: pnpm lint

      - name: Type check
        working-directory: frontend
        run: pnpm typecheck

      - name: Test
        working-directory: frontend
        run: pnpm test

      - name: Build
        working-directory: frontend
        run: pnpm build
