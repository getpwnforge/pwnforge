name: Bug report
description: Report something that isn't working as expected
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please do **not** use this form for security vulnerabilities — see [SECURITY.md](../../SECURITY.md) instead.

  - type: input
    id: version
    attributes:
      label: PwnForge version
      description: Version or commit hash (check Settings → About, or `docker images`)
      placeholder: "v0.4.2 or commit abc1234"
    validations:
      required: true

  - type: dropdown
    id: deployment
    attributes:
      label: Deployment type
      options:
        - Cloud (pwnforge.app)
        - Self-hosted (docker-compose.yml)
        - Self-hosted (dev / docker-compose.dev.yml)
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Backend/frontend logs, browser console errors, etc. (redact any secrets or tokens)
      render: shell
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Browser, OS, anything else relevant
    validations:
      required: false
